<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soporte360 - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --surface2:     #1c2128;
      --border:       #30363d;
      --border2:      #444c56;
      --text:         #e6edf3;
      --text-muted:   #7d8590;
      --primary:      #185FA5;
      --primary-h:    #1a6fbe;
      --green:        #3fb950;
      --green-bg:     #0d2a1a;
      --red:          #f85149;
      --red-bg:       #2d0f0f;
      --yellow:       #d29922;
      --accent:       #e242bc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.65rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 0.75rem; }
    .logo {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem; color: white;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.05rem; font-weight: 600; }
    header h1 span { color: var(--text-muted); font-weight: 400; }
    #last-update { font-size: 0.75rem; color: var(--text-muted); }

    /* ── Status bar ── */
    #status-bar {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 0.4rem 1.5rem;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      font-size: 0.78rem;
      flex-shrink: 0;
    }
    .stat { display: flex; align-items: center; gap: 0.4rem; color: var(--text-muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-blue  { background: var(--primary); }
    .dot-green { background: var(--green); }
    .dot-red   { background: var(--red); }
    .stat b { color: var(--text); font-weight: 600; }
    #countdown { margin-left: auto; color: var(--text-muted); font-size: 0.72rem; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    /* ── Buttons ── */
    .btn {
      padding: 0.38rem 0.85rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 0.78rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary  { background: var(--primary); color: white; border-color: var(--primary); }
    .btn-primary:hover  { background: var(--primary-h); }
    .btn-ghost    { background: transparent; color: var(--text-muted); border-color: var(--border); }
    .btn-ghost:hover    { background: var(--surface2); color: var(--text); }
    .btn-danger   { background: transparent; color: var(--red); border-color: #5a1a1a; }
    .btn-danger:hover   { background: var(--red-bg); }
    .btn-sm { padding: 0.22rem 0.6rem; font-size: 0.72rem; }
    .btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 190px;
      min-width: 190px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 0.75rem 0;
      flex-shrink: 0;
    }
    .sidebar-label {
      font-size: 0.67rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 0 1rem 0.5rem;
    }
    .group-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.42rem 1rem;
      cursor: pointer;
      font-size: 0.8rem;
      border-left: 2px solid transparent;
      transition: all 0.12s;
      color: var(--text-muted);
    }
    .group-item:hover { background: var(--surface2); color: var(--text); }
    .group-item.active { border-left-color: var(--primary); color: var(--text); background: var(--surface2); }
    .group-item .gi-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .group-item .gi-count {
      background: var(--bg);
      color: var(--text-muted);
      font-size: 0.68rem;
      padding: 1px 5px;
      border-radius: 10px;
      min-width: 20px;
      text-align: center;
      flex-shrink: 0;
    }
    .group-item.active .gi-count { background: var(--primary); color: white; }
    .group-item .gi-edit {
      opacity: 0;
      font-size: 0.7rem;
      color: var(--text-muted);
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 1px 3px;
      border-radius: 3px;
      transition: all 0.12s;
    }
    .group-item:hover .gi-edit { opacity: 1; }
    .group-item .gi-edit:hover { color: var(--text); background: var(--border); }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem 1.5rem;
    }

    /* ── Cards grid ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 0.7rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      position: relative;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card:hover { border-color: var(--border2); box-shadow: 0 4px 14px rgba(0,0,0,0.35); }
    .card.online  { border-top: 2px solid var(--green); }
    .card.offline { border-top: 2px solid #3a1a1a; opacity: 0.72; }

    .card-menu {
      position: absolute;
      top: 0.55rem;
      right: 0.55rem;
      display: flex;
      gap: 0.2rem;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .card:hover .card-menu { opacity: 1; }
    .icon-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px 6px;
      border-radius: 5px;
      font-size: 0.72rem;
      transition: all 0.12s;
      line-height: 1;
    }
    .icon-btn:hover { background: var(--border); color: var(--text); }
    .icon-btn.del:hover { background: var(--red-bg); color: var(--red); border-color: #5a1a1a; }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 0.55rem;
      padding-right: 3rem;
    }
    .card-name {
      font-weight: 600;
      font-size: 0.86rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      max-width: 100%;
    }
    .card-name:hover { color: var(--primary); text-decoration: underline; }
    .card-alias {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
      margin-bottom: 0.4rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge.online  { background: var(--green-bg); color: var(--green); border: 1px solid #1a4d2a; }
    .badge.offline { background: #1a0a0a; color: #7d3030; border: 1px solid #3a1a1a; }

    .card-meta {
      margin-bottom: 0.7rem;
    }
    .meta-row {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      line-height: 1.75;
    }
    .meta-label {
      font-size: 0.63rem;
      font-weight: 600;
      color: #444c56;
      text-transform: uppercase;
      min-width: 22px;
      letter-spacing: 0.03em;
    }
    .meta-val {
      font-size: 0.73rem;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Cascadia Code', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .meta-val.hi { color: var(--text); }
    .meta-val.green { color: var(--green); }
    .meta-val.yellow { color: var(--yellow); }
    .meta-val.dim { color: #444c56; }

    .card-actions { display: flex; gap: 0.4rem; }
    .card-actions .btn { flex: 1; text-align: center; }

    /* ── Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem 1.5rem;
      width: 420px;
      max-width: 92vw;
    }
    .modal-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 1.1rem; }
    .form-row { margin-bottom: 0.85rem; }
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .form-input {
      width: 100%;
      padding: 0.48rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.82rem;
    }
    .form-input:focus { outline: none; border-color: var(--primary); }
    .form-input::placeholder { color: #3d444d; }
    .modal-footer {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.1rem;
    }

    /* ── Error ── */
    #error-msg {
      margin: 0.6rem 1.5rem 0;
      padding: 0.55rem 1rem;
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid #5a1a1a;
      border-radius: 6px;
      font-size: 0.8rem;
      display: none;
      flex-shrink: 0;
    }

    /* ── Search ── */
    .search-input {
      padding: 0.38rem 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.78rem;
      width: 200px;
      margin-left: auto;
    }
    .search-input:focus { outline: none; border-color: var(--primary); }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.85rem; }

    /* ── Confirm modal ── */
    .confirm-body { font-size: 0.83rem; color: var(--text-muted); margin-bottom: 0.25rem; }
    .confirm-body b { color: var(--text); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">S3</div>
    <h1>Soporte360 <span>/ Dashboard</span></h1>
  </div>
  <span id="last-update">Cargando...</span>
</header>

<div id="error-msg"></div>

<div id="status-bar">
  <div class="stat"><div class="dot dot-blue"></div>Total: <b id="stat-total">0</b></div>
  <div class="stat"><div class="dot dot-green"></div>Online: <b id="stat-online">0</b></div>
  <div class="stat"><div class="dot dot-red"></div>Offline: <b id="stat-offline">0</b></div>
  <span id="countdown"></span>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="openAdd()">＋ Agregar equipo</button>
  <button class="btn btn-ghost" onclick="openAddGroup()">＋ Grupo</button>
  <input class="search-input" id="search" placeholder="Buscar..." oninput="renderCards()">
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main-content">
    <div id="cards-area"></div>
  </main>
</div>

<!-- Modal: equipo -->
<div class="overlay" id="modal-equipo">
  <div class="modal">
    <div class="modal-title" id="meq-title">Agregar equipo</div>
    <div class="form-row">
      <label class="form-label">Nombre *</label>
      <input class="form-input" id="f-nombre" placeholder="DESKTOP-EJEMPLO">
    </div>
    <div class="form-row">
      <label class="form-label">IP Tailscale *</label>
      <input class="form-input" id="f-ip" placeholder="100.x.x.x">
    </div>
    <div class="form-row">
      <label class="form-label">ID Soporte360</label>
      <input class="form-input" id="f-sid" placeholder="123456789">
    </div>
    <div class="form-row">
      <label class="form-label">Alias o nombre de usuario</label>
      <input class="form-input" id="f-alias" placeholder="Juan Pérez">
    </div>
    <div class="form-row">
      <label class="form-label">Grupo</label>
      <input class="form-input" id="f-grupo" placeholder="Oficina Central" list="dl-grupos">
      <datalist id="dl-grupos"></datalist>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
      <button class="btn btn-primary" id="meq-save" onclick="saveEquipo()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: confirmar borrar -->
<div class="overlay" id="modal-confirm">
  <div class="modal">
    <div class="modal-title">Confirmar eliminación</div>
    <div class="confirm-body" id="confirm-body">¿Eliminar este equipo?</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
      <button class="btn btn-danger" onclick="doDelete()">Eliminar</button>
    </div>
  </div>
</div>

<div class="overlay" id="modal-desinstalar">
  <div class="modal">
    <div class="modal-title">⚠ Desinstalar remotamente</div>
    <div class="confirm-body" id="desinstalar-body"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
      <button class="btn btn-danger" onclick="doDesinstalar()">Desinstalar</button>
    </div>
  </div>
</div>

<!-- Modal: grupo -->
<div class="overlay" id="modal-grupo">
  <div class="modal">
    <div class="modal-title" id="mg-title">Nuevo grupo</div>
    <div class="form-row">
      <label class="form-label">Nombre del grupo *</label>
      <input class="form-input" id="f-gname" placeholder="Oficina Central">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModals()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveGrupo()">Crear</button>
    </div>
  </div>
</div>

<script>
  const API = "http://100.85.203.15:8080";

  let equipos  = [];
  let selGroup = "__all__";
  let editIP   = null;
  let delIP    = null;
  let countdownVal = 30;
  let timer;

  // ── Password (SHA-256 puro JS, sin crypto.subtle) ────────────────────────
  function sha256bytes(str) {
    const K = [
      0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
      0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
      0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
      0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
      0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
      0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
      0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
      0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
    ];
    // UTF-8 encode
    const bytes = [];
    for (let i = 0; i < str.length; i++) {
      const c = str.charCodeAt(i);
      if      (c < 0x80)  bytes.push(c);
      else if (c < 0x800) bytes.push(0xc0|(c>>6), 0x80|(c&0x3f));
      else                bytes.push(0xe0|(c>>12), 0x80|((c>>6)&0x3f), 0x80|(c&0x3f));
    }
    // Padding
    const msgLen = bytes.length;
    bytes.push(0x80);
    while (bytes.length % 64 !== 56) bytes.push(0);
    const bitLenHi = Math.floor(msgLen / 0x20000000);
    const bitLenLo = (msgLen * 8) >>> 0;
    bytes.push(
      (bitLenHi>>>24)&0xff,(bitLenHi>>>16)&0xff,(bitLenHi>>>8)&0xff, bitLenHi&0xff,
      (bitLenLo>>>24)&0xff,(bitLenLo>>>16)&0xff,(bitLenLo>>>8)&0xff, bitLenLo&0xff
    );
    // Initial hash values
    let h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a;
    let h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;
    const rotr = (x,n) => (x>>>n)|(x<<(32-n));
    // Process each 512-bit chunk
    for (let i = 0; i < bytes.length; i += 64) {
      const w = [];
      for (let j = 0;  j < 16; j++)
        w.push((bytes[i+j*4]<<24)|(bytes[i+j*4+1]<<16)|(bytes[i+j*4+2]<<8)|bytes[i+j*4+3]);
      for (let j = 16; j < 64; j++) {
        const s0 = rotr(w[j-15],7)^rotr(w[j-15],18)^(w[j-15]>>>3);
        const s1 = rotr(w[j-2],17)^rotr(w[j-2],19)^(w[j-2]>>>10);
        w.push((w[j-16]+s0+w[j-7]+s1)|0);
      }
      let a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,hh=h7;
      for (let j = 0; j < 64; j++) {
        const S1 = rotr(e,6)^rotr(e,11)^rotr(e,25);
        const ch = (e&f)^(~e&g);
        const t1 = (hh+S1+ch+K[j]+w[j])|0;
        const S0 = rotr(a,2)^rotr(a,13)^rotr(a,22);
        const maj = (a&b)^(a&c)^(b&c);
        const t2 = (S0+maj)|0;
        hh=g; g=f; f=e; e=(d+t1)|0; d=c; c=b; b=a; a=(t1+t2)|0;
      }
      h0=(h0+a)|0; h1=(h1+b)|0; h2=(h2+c)|0; h3=(h3+d)|0;
      h4=(h4+e)|0; h5=(h5+f)|0; h6=(h6+g)|0; h7=(h7+hh)|0;
    }
    const out = [];
    for (const word of [h0,h1,h2,h3,h4,h5,h6,h7])
      out.push((word>>>24)&0xff,(word>>>16)&0xff,(word>>>8)&0xff,word&0xff);
    return out;
  }

  function calcularPassword(nombreEquipo) {
    const hash  = sha256bytes('FRCM2026-' + nombreEquipo.toUpperCase());
    const chars = 'abcdefghjkmnpqrstuvwxyzABCDEFGHJKMNPQRSTUVWXYZ23456789';
    let r = '';
    for (let i = 0; i < 8; i++) r += chars[hash[i] % chars.length];
    return r;
  }

  // ── API helpers ──────────────────────────────────────────────────────────
  async function get(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }
  async function post(url, body) {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j.error || `HTTP ${r.status}`);
    return j;
  }

  // ── Helpers de estado ────────────────────────────────────────────────────
  function recentHandshake(hs) {
    if (!hs || hs.startsWith("0001-01-01")) return false;
    const d = new Date(hs);
    return !isNaN(d) && (Date.now() - d) < 86400000;
  }

  function fmtLastSeen(hs) {
    if (!hs || hs.startsWith("0001-01-01")) return { t: "Nunca", c: "dim" };
    const d = new Date(hs);
    if (isNaN(d)) return { t: "Nunca", c: "dim" };
    const ms   = Date.now() - d;
    const mins = Math.floor(ms / 60000);
    const hrs  = Math.floor(ms / 3600000);
    const days = Math.floor(ms / 86400000);
    const t = mins < 2    ? "Ahora"
            : mins < 60   ? `Hace ${mins}m`
            : hrs  < 24   ? `Hace ${hrs}h`
            : `Hace ${days}d`;
    const c = ms < 300000    ? "green"
            : ms < 86400000  ? "yellow"
            : "dim";
    return { t, c };
  }

  // ── Build equipos ────────────────────────────────────────────────────────
  function buildEquipos(ts, clients) {
    const byIP = {};
    for (const c of clients) if (c.ip) byIP[c.ip.trim()] = c;

    const list = [];
    const peers = ts.Peer ? Object.values(ts.Peer) : [];
    if (ts.Self) peers.push({ ...ts.Self, _self: true });

    for (const p of peers) {
      const ip     = (p.TailscaleIPs && p.TailscaleIPs[0]) || "";
      const cli    = byIP[ip];
      if (!cli) continue; // solo mostrar peers registrados en clients.json

      const nombre = p.HostName || p.DNSName || ip || "Desconocido";
      const online = p.Online === true || p.Active === true || p._self === true || recentHandshake(p.LastHandshake);
      const ls     = fmtLastSeen(p.LastHandshake);

      list.push({
        nombre:     cli.nombre || nombre,
        hostName:   p.HostName || "",
        ip, online,
        os:         p.OS || "",
        lastSeen:   ls,
        soporte_id: cli.soporte_id || "",
        password:   cli.password   || "",
        grupo:      cli.grupo || "",
        alias:      cli.alias  || "",
        _fromTS:    true
      });
      if (ip) delete byIP[ip];
    }

    for (const c of Object.values(byIP)) {
      list.push({
        nombre:     c.nombre || c.ip || "Desconocido",
        hostName:   c.nombre || "",
        ip:         c.ip || "",
        online:     false,
        os:         "",
        lastSeen:   { t: "Sin Tailscale", c: "dim" },
        soporte_id: c.soporte_id || "",
        grupo:      c.grupo || "",
        alias:      c.alias  || "",
        _fromTS:    false
      });
    }
    return list;
  }

  // ── Sidebar ──────────────────────────────────────────────────────────────
  function renderSidebar() {
    const counts = {};
    for (const e of equipos) {
      const g = e.grupo && e.grupo.trim() ? e.grupo.trim() : "Sin grupo";
      counts[g] = (counts[g] || 0) + 1;
    }

    const groups = Object.keys(counts).sort((a, b) => {
      if (a === "Sin grupo") return 1;
      if (b === "Sin grupo") return -1;
      return a.localeCompare(b);
    });

    let html = `<div class="sidebar-label">Grupos</div>`;
    html += `<div class="group-item ${selGroup === '__all__' ? 'active' : ''}" onclick="setGroup('__all__')">
      <span class="gi-name">Todos</span>
      <span class="gi-count">${equipos.length}</span>
    </div>`;

    for (const g of groups) {
      const active = selGroup === g ? "active" : "";
      const gesc = g.replace(/'/g, "\\'");
      html += `<div class="group-item ${active}" onclick="setGroup('${gesc}')">
        <span class="gi-name">${g}</span>
        <span class="gi-count">${counts[g]}</span>
        <button class="gi-edit" title="Renombrar grupo" onclick="event.stopPropagation();renameGroup('${gesc}')">&#9998;</button>
      </div>`;
    }

    document.getElementById("sidebar").innerHTML = html;

    const dl = document.getElementById("dl-grupos");
    if (dl) dl.innerHTML = groups.filter(g => g !== "Sin grupo").map(g => `<option value="${g}">`).join("");
  }

  // ── Cards ────────────────────────────────────────────────────────────────
  function renderCards() {
    const q = document.getElementById("search").value.toLowerCase().trim();
    let list = equipos;

    if (selGroup !== "__all__") {
      list = list.filter(e => {
        const g = e.grupo && e.grupo.trim() ? e.grupo.trim() : "Sin grupo";
        return g === selGroup;
      });
    }

    if (q) {
      list = list.filter(e =>
        e.nombre.toLowerCase().includes(q) ||
        e.ip.includes(q) ||
        e.soporte_id.includes(q) ||
        (e.grupo  || "").toLowerCase().includes(q) ||
        (e.alias  || "").toLowerCase().includes(q)
      );
    }

    list = [...list].sort((a, b) => (b.online ? 1 : 0) - (a.online ? 1 : 0));

    const area = document.getElementById("cards-area");
    if (!list.length) {
      area.innerHTML = '<div class="empty">No se encontraron equipos.</div>';
      return;
    }

    const grid = document.createElement("div");
    grid.className = "cards";

    for (const e of list) {
      const sc    = e.online ? "online" : "offline";
      const sl    = e.online ? "Online"  : "Offline";
      const hasId = e.soporte_id && e.soporte_id.trim() !== "";
      const ls    = e.lastSeen || { t: "—", c: "" };
      const ipS   = (e.ip || "").replace(/'/g, "");
      const nmS   = (e.nombre || "").replace(/'/g, "&#39;").replace(/"/g, "&quot;");
      const hnS   = (e.hostName || e.nombre || "").replace(/'/g, "").replace(/"/g, "");

      const aliasHtml = e.alias
        ? `<div class="card-alias">${e.alias}</div>`
        : "";

      const div = document.createElement("div");
      div.className = `card ${sc}`;
      div.innerHTML = `
        <div class="card-menu">
          <button class="icon-btn" title="Editar" onclick="openEdit('${ipS}')">✏</button>
          <button class="icon-btn del" title="Eliminar" onclick="openDel('${ipS}','${nmS}')">✕</button>
        </div>
        <div class="card-top">
          <div class="card-name" title="${e.nombre}" onclick="openEdit('${ipS}')">${e.nombre}</div>
        </div>
        ${aliasHtml}
        <span class="badge ${sc}" style="margin-bottom:0.55rem;display:inline-block">${sl}</span>
        <div class="card-meta">
          <div class="meta-row">
            <span class="meta-label">IP</span>
            <span class="meta-val hi">${e.ip || "—"}</span>
          </div>
          ${e.os ? `<div class="meta-row"><span class="meta-label">OS</span><span class="meta-val">${e.os}</span></div>` : ""}
          <div class="meta-row">
            <span class="meta-label">Visto</span>
            <span class="meta-val ${ls.c}">${ls.t}</span>
          </div>
          <div class="meta-row">
            <span class="meta-label">ID</span>
            <span class="meta-val ${hasId ? 'hi' : 'dim'}">${hasId ? e.soporte_id : "Sin ID"}</span>
          </div>
        </div>
        <div class="card-actions">
          ${e.ip ? `<button class="btn btn-primary btn-sm" onclick="rdp('${ipS}','${nmS}')">Conectar (RDP)</button>` : `<button class="btn btn-primary btn-sm" disabled>Sin IP</button>`}
          ${e.ip ? `<button class="btn btn-danger btn-sm" onclick="openDesinstalar('${ipS}','${nmS}')" title="Desinstalar remotamente">🗑</button>` : ""}
        </div>
      `;
      grid.appendChild(div);
    }

    area.innerHTML = "";
    area.appendChild(grid);
  }

  function setGroup(g) { selGroup = g; renderSidebar(); renderCards(); }

  // ── Render all ───────────────────────────────────────────────────────────
  async function render() {
    let ts = {}, clients = [];
    try {
      [ts, clients] = await Promise.all([
        get(`${API}/tailscale-status`),
        get(`${API}/clients.json`)
      ]);
      document.getElementById("error-msg").style.display = "none";
    } catch (e) {
      showErr("Error al conectar con el servidor: " + e.message);
      document.getElementById("last-update").textContent = "Error";
      return;
    }

    equipos = buildEquipos(ts, clients);

    const on  = equipos.filter(e => e.online).length;
    const off = equipos.filter(e => !e.online).length;
    document.getElementById("stat-total").textContent  = equipos.length;
    document.getElementById("stat-online").textContent = on;
    document.getElementById("stat-offline").textContent = off;
    document.getElementById("last-update").textContent =
      "Actualizado: " + new Date().toLocaleTimeString("es-AR");

    renderSidebar();
    renderCards();
  }

  // ── Modals ───────────────────────────────────────────────────────────────
  function closeModals() {
    document.querySelectorAll(".overlay").forEach(o => o.classList.remove("open"));
    editIP = null; delIP = null;
  }
  document.querySelectorAll(".overlay").forEach(o => {
    o.addEventListener("click", e => { if (e.target === o) closeModals(); });
  });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeModals();
    if (e.key === "Enter" && document.getElementById("modal-equipo").classList.contains("open")) saveEquipo();
  });

  function openAdd() {
    editIP = null;
    document.getElementById("meq-title").textContent = "Agregar equipo";
    document.getElementById("meq-save").textContent  = "Agregar";
    document.getElementById("f-nombre").value = "";
    document.getElementById("f-ip").value     = "";
    document.getElementById("f-sid").value    = "";
    document.getElementById("f-alias").value  = "";
    document.getElementById("f-grupo").value  = selGroup !== "__all__" && selGroup !== "Sin grupo" ? selGroup : "";
    document.getElementById("modal-equipo").classList.add("open");
    setTimeout(() => document.getElementById("f-nombre").focus(), 50);
  }

  function openEdit(ip) {
    const e = equipos.find(x => x.ip === ip);
    if (!e) return;
    editIP = ip;
    document.getElementById("meq-title").textContent = "Editar equipo";
    document.getElementById("meq-save").textContent  = "Guardar cambios";
    document.getElementById("f-nombre").value = e.nombre     || "";
    document.getElementById("f-ip").value     = e.ip         || "";
    document.getElementById("f-sid").value    = e.soporte_id || "";
    document.getElementById("f-alias").value  = e.alias      || "";
    document.getElementById("f-grupo").value  = e.grupo      || "";
    document.getElementById("modal-equipo").classList.add("open");
    setTimeout(() => document.getElementById("f-nombre").focus(), 50);
  }

  function openDel(ip, nombre) {
    delIP = ip;
    document.getElementById("confirm-body").innerHTML =
      `¿Eliminar el equipo <b>${nombre}</b>?<br><small style="color:var(--text-muted)">${ip}</small>`;
    document.getElementById("modal-confirm").classList.add("open");
  }

  function openAddGroup() {
    document.getElementById("f-gname").value = "";
    document.getElementById("mg-title").textContent = "Nuevo grupo";
    document.getElementById("modal-grupo").classList.add("open");
    setTimeout(() => document.getElementById("f-gname").focus(), 50);
  }

  function renameGroup(grupo) {
    document.getElementById("f-gname").value = grupo;
    document.getElementById("mg-title").textContent = "Renombrar grupo";
    document.getElementById("modal-grupo").classList.add("open");
    setTimeout(() => document.getElementById("f-gname").focus(), 50);
    // Store old name so saveGrupo can rename
    document.getElementById("modal-grupo").dataset.renameFrom = grupo;
  }

  // ── Save equipo ──────────────────────────────────────────────────────────
  async function saveEquipo() {
    const nombre = document.getElementById("f-nombre").value.trim();
    const ip     = document.getElementById("f-ip").value.trim();
    const sid    = document.getElementById("f-sid").value.trim();
    const alias  = document.getElementById("f-alias").value.trim();
    const grupo  = document.getElementById("f-grupo").value.trim();

    if (!nombre || !ip) { alert("Nombre e IP son obligatorios."); return; }

    try {
      if (editIP) {
        await post(`${API}/actualizar`, { original_ip: editIP, nombre, ip, soporte_id: sid, alias, grupo });
      } else {
        await post(`${API}/registrar`,  { nombre, ip, soporte_id: sid, alias, grupo });
      }
      closeModals();
      await render();
    } catch (e) { alert("Error: " + e.message); }
  }

  // ── Delete equipo ────────────────────────────────────────────────────────
  async function doDelete() {
    if (!delIP) return;
    try {
      await post(`${API}/eliminar`, { ip: delIP });
      closeModals();
      await render();
    } catch (e) { alert("Error: " + e.message); }
  }

  // ── Desinstalar remoto ────────────────────────────────────────────────────
  let desinstalarIP = null;
  let desinstalarNombre = null;

  function openDesinstalar(ip, nombre) {
    desinstalarIP = ip;
    desinstalarNombre = nombre;
    document.getElementById("desinstalar-body").innerHTML =
      `Esto desinstalará Soporte360 del equipo <b>${nombre}</b>.<br>
       <small style="color:var(--text-muted)">${ip}</small><br><br>
       El equipo ejecutará la desinstalación en los próximos 5 minutos.`;
    document.getElementById("modal-desinstalar").classList.add("open");
  }

  async function doDesinstalar() {
    if (!desinstalarIP) return;
    try {
      await post(`${API}/enviar-comando`, { ip: desinstalarIP, accion: "desinstalar" });
      closeModals();
      alert(`Comando enviado a ${desinstalarNombre}. Se desinstalará en los próximos 5 minutos.`);
    } catch (e) { alert("Error: " + e.message); }
  }

  // ── Save/rename group ────────────────────────────────────────────────────
  async function saveGrupo() {
    const nombre = document.getElementById("f-gname").value.trim();
    if (!nombre) return;

    const from = document.getElementById("modal-grupo").dataset.renameFrom || "";
    document.getElementById("modal-grupo").dataset.renameFrom = "";

    if (from && from !== nombre) {
      // Rename: update all clients with this group
      const targets = equipos.filter(e => {
        const g = e.grupo && e.grupo.trim() ? e.grupo.trim() : "Sin grupo";
        return g === from;
      });
      try {
        for (const t of targets) {
          await post(`${API}/actualizar`, {
            original_ip: t.ip, nombre: t.nombre, ip: t.ip,
            soporte_id: t.soporte_id, alias: t.alias, grupo: nombre
          });
        }
        closeModals();
        await render();
        setGroup(nombre);
      } catch (e) { alert("Error al renombrar: " + e.message); }
    } else {
      // New group: just close and open add modal with group pre-filled
      closeModals();
      openAdd();
      document.getElementById("f-grupo").value = nombre;
    }
  }

  // ── Connect / RDP ────────────────────────────────────────────────────────
  async function connect(id, hostName, savedPass) {
    if (!id) return;
    const pass = savedPass || await calcularPassword(hostName || "");
    window.location.href = `soporte360://${id}?password=${encodeURIComponent(pass)}`;
  }

  function rdp(ip, nombre) {
    const lines = [
      "full address:s:" + ip,
      "prompt for credentials:i:1",
      "screen mode id:i:2",
      "use multimon:i:0",
      "desktopwidth:i:1920",
      "desktopheight:i:1080",
      "session bpp:i:32",
      "compression:i:1",
      "keyboardhook:i:2",
      "audiocapturemode:i:0",
      "videoplaybackmode:i:1",
      "connection type:i:7",
      "networkautodetect:i:1",
      "bandwidthautodetect:i:1",
      "displayconnectionbar:i:1",
      "enableworkspacereconnect:i:0",
      "disable wallpaper:i:0",
      "allow font smoothing:i:1",
      "allow desktop composition:i:1",
      "redirectprinters:i:0",
      "redirectclipboard:i:1",
      "redirectsmartcards:i:0",
      "redirectwebauthn:i:1",
      "autoreconnection enabled:i:1",
      "authentication level:i:2",
      "negotiate security layer:i:1",
    ].join("\r\n");

    const blob = new Blob([lines], { type: "application/x-rdp" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = (nombre || ip) + ".rdp"; a.click();
    URL.revokeObjectURL(url);
  }

  // ── Error ────────────────────────────────────────────────────────────────
  function showErr(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg; el.style.display = "block";
  }

  // ── Countdown ────────────────────────────────────────────────────────────
  function startCountdown() {
    clearInterval(timer);
    countdownVal = 30;
    timer = setInterval(() => {
      countdownVal--;
      document.getElementById("countdown").textContent = `Actualiza en ${countdownVal}s`;
      if (countdownVal <= 0) { render(); countdownVal = 30; }
    }, 1000);
  }

  render();
  startCountdown();
</script>
</body>
</html>
